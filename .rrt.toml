# rrt (repo-release-tools) configuration for werkstoff.
#
# werkstoff bundles three independently-versioned Claude Code plugins in one
# repo (self-assess, quality, compass), each with its own
# plugins/<name>/.claude-plugin/plugin.json declaring its own "version".
# `version_groups` lets rrt bump each plugin's version independently
# (`rrt bump <bump> --group <name>`) rather than forcing one repo-wide
# version across all three. Requires rrt >= 1.13.1 (see
# anselmoo/repo-release-tools#175 — fixed in #176 — for why anything older
# fails with "Multiple version groups configured" on a valid --group).

[[tool.rrt.version_groups]]
name = "self-assess"
release_branch = "release/self-assess/v{version}"
changelog_file = "plugins/self-assess/CHANGELOG.md"

  [[tool.rrt.version_groups.version_targets]]
  path = "plugins/self-assess/.claude-plugin/plugin.json"
  kind = "package_json"

[[tool.rrt.version_groups]]
name = "quality"
release_branch = "release/quality/v{version}"
changelog_file = "plugins/quality/CHANGELOG.md"

  [[tool.rrt.version_groups.version_targets]]
  path = "plugins/quality/.claude-plugin/plugin.json"
  kind = "package_json"

[[tool.rrt.version_groups]]
name = "compass"
release_branch = "release/compass/v{version}"
changelog_file = "plugins/compass/CHANGELOG.md"

  [[tool.rrt.version_groups.version_targets]]
  path = "plugins/compass/.claude-plugin/plugin.json"
  kind = "package_json"

# Field-level sync (rrt fields): each plugin's own plugin.json is the
# single source of truth for its description; the marketplace.json
# listing entry is a copy that must be kept in sync rather than hand-
# edited independently. Requires rrt with the `fields` command
# (anselmoo/repo-release-tools#178 / PR anselmoo/repo-release-tools#179 —
# not yet published at the time this was added; run from a local branch
# checkout via `uv run --project <path-to-repo-release-tools> rrt fields`
# until it ships in a release).

[[tool.rrt.field_targets]]
source = "plugins/self-assess/.claude-plugin/plugin.json"
source_field = "description"
targets = [
  { path = ".claude-plugin/marketplace.json", field = "plugins[name=self-assess].description" },
]

[[tool.rrt.field_targets]]
source = "plugins/quality/.claude-plugin/plugin.json"
source_field = "description"
targets = [
  { path = ".claude-plugin/marketplace.json", field = "plugins[name=quality].description" },
]

[[tool.rrt.field_targets]]
source = "plugins/compass/.claude-plugin/plugin.json"
source_field = "description"
targets = [
  { path = ".claude-plugin/marketplace.json", field = "plugins[name=compass].description" },
]

[[tool.rrt.field_targets]]
source = "plugins/cupertino/.claude-plugin/plugin.json"
source_field = "description"
targets = [
  { path = ".claude-plugin/marketplace.json", field = "plugins[name=cupertino].description" },
]

[[tool.rrt.field_targets]]
source = "plugins/andon/.claude-plugin/plugin.json"
source_field = "description"
targets = [
  { path = ".claude-plugin/marketplace.json", field = "plugins[name=andon].description" },
]

[[tool.rrt.field_targets]]
source = "plugins/cli-scaffold/.claude-plugin/plugin.json"
source_field = "description"
targets = [
  { path = ".claude-plugin/marketplace.json", field = "plugins[name=cli-scaffold].description" },
]
