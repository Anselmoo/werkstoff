// Layout: a chord diagram with two clusters on one circle — the 21 technique
// docs along the top arc (grouped by compass skill, index.md's order within
// each group), the 15 grounding targets along the bottom arc. Chords are
// quadratic Beziers pulled through the circle's center, the classic
// chord-diagram curve, connecting a technique to each target its doc cites.
// ══════════════════════════════════════════════════════════════════════════
const W = 1360, H = 1180, CX = W / 2, CY = H / 2 + 10, R = 380;
const LABEL_GAP = 20;

function arcAngles(startDeg, endDeg, n) {
  if (n === 1) return [(startDeg + endDeg) / 2];
  const step = (endDeg - startDeg) / (n - 1);
  return Array.from({ length: n }, (_, i) => startDeg + i * step);
}
function polar(r, phiDeg) {
  const phi = (phiDeg * Math.PI) / 180;
  return { x: CX + r * Math.cos(phi), y: CY + r * Math.sin(phi) };
}

const techAngles = arcAngles(200, 340, TECHNIQUES.length);
const targetAngles = arcAngles(20, 160, TARGETS.length);

const positions = new Map(); // id -> { x, y, phi, kind }
TECHNIQUES.forEach((t, i) => { const p = polar(R, techAngles[i]); positions.set(t.id, { ...p, phi: techAngles[i], kind: "tech" }); });
TARGETS.forEach((t, i) => { const p = polar(R, targetAngles[i]); positions.set(t.id, { ...p, phi: targetAngles[i], kind: "target" }); });

function labelAnchor(phiDeg) {
  // Always anchor by the sign of cos (never "middle") — near-vertical
  // neighbors (e.g. active-prompt at 265.9deg and rag at 274.1deg, either
  // side of the top-center 270deg mark) still sit at nearly the same x, and
  // a shared "middle" anchor stacked their labels directly on top of each
  // other. Sign-based start/end anchoring flows each one's text to its own
  // side even when x is nearly identical, which resolves that collision.
  const rad = (phiDeg * Math.PI) / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  const anchor = cos >= 0 ? "start" : "end";
  const dy = sin >= 0 ? 14 : -6;
  return { anchor, dy };
}
function truncate(s, n) {
  s = String(s == null ? "" : s).trim();
  return s.length > n ? s.slice(0, n - 1) + "…" : s;
}

const legendEl = document.getElementById("legend");
const sidebar = document.getElementById("sidebar");

statsEl.textContent = `${TECHNIQUES.length} techniques · ${TARGETS.length} grounding targets · ${totalCitations} citations`;

// Legend: one row per compass-skill group, plus one for the grounding-target
// marker shape. Clicking a group row highlights every technique in it.
let legendHtml = `<div class="hdr">Technique groups (compass skill)</div>`;
for (const g of GROUPS) {
  legendHtml += `<div class="row" data-group="${esc(g.id)}"><span class="swatch" style="background:${g.color}"></span>${esc(g.id.replace(/^compass-/, ""))}</div>`;
}
legendHtml += `<div class="hdr">Grounding targets</div>
  <div class="row" data-group="__targets__"><span class="swatch diamond"></span>cited in werkstoff (15)</div>`;
legendEl.innerHTML = legendHtml;

// Chord paths, one per (technique, citation) pair.
const chordEls = [];
for (const tech of TECHNIQUES) {
  const from = positions.get(tech.id);
  for (const c of tech.citations) {
    const to = positions.get(c.target);
    if (!to) continue;
    const path = el("path", { d: `M${from.x},${from.y} Q${CX},${CY} ${to.x},${to.y}`,
      "data-tech": tech.id, "data-target": c.target }, "chord");
    path.style.stroke = groupsById.get(tech.group).color;
    viewport.appendChild(path);
    chordEls.push(path);
  }
}

const nodeEls = new Map(); // id -> { g, kind }

function buildNode(id, kind) {
  const pos = positions.get(id);
  const g = el("g", { "data-id": id }, "node " + kind);
  if (kind === "tech") {
    const tech = techsById.get(id);
    const color = groupsById.get(tech.group).color;
    const c = el("circle", { cx: pos.x, cy: pos.y, r: 7 }, "marker");
    c.style.fill = color;
    g.appendChild(c);
  } else {
    const size = 8;
    const rect = el("rect", { x: pos.x - size, y: pos.y - size, width: size * 2, height: size * 2,
      rx: 2, transform: `rotate(45 ${pos.x} ${pos.y})` }, "marker");
    rect.style.fill = "var(--panel-2)";
    rect.style.stroke = "var(--target)";
    rect.style.strokeWidth = "2";
    g.appendChild(rect);
  }
  const { anchor, dy } = labelAnchor(pos.phi);
  const labelPos = polar(R + LABEL_GAP, pos.phi);
  const rawLabel = kind === "tech" ? techsById.get(id).title : targetsById.get(id).label;
  // Prefer a title's trailing "(ABBR)" — e.g. "Program-Aided Language Models
  // (PAL)" -> "PAL" — over truncating a long full name mid-word.
  const abbrev = kind === "tech" && rawLabel.match(/\(([A-Z]{2,6})\)$/);
  const label = abbrev ? abbrev[1] : rawLabel;
  const t = el("text", { x: labelPos.x, y: labelPos.y + dy, "text-anchor": anchor }, "label");
  t.textContent = truncate(label, 34);
  g.appendChild(t);

  g.addEventListener("mouseenter", () => setHover(id));
  g.addEventListener("mouseleave", () => setHover(null));
  g.addEventListener("click", (e) => { e.stopPropagation(); select(id, kind); });
  viewport.appendChild(g);
  nodeEls.set(id, { g, kind });
}
TECHNIQUES.forEach(t => buildNode(t.id, "tech"));
TARGETS.forEach(t => buildNode(t.id, "target"));

// ── Highlighting: hover previews, click pins (persists until another click
// or empty-canvas click clears it). Hover always wins visually while active.
let selectedId = null, hoverId = null;

function connectedIds(id) {
  const kind = nodeEls.get(id)?.kind;
  if (kind === "tech") return new Set(techsById.get(id).citations.map(c => c.target));
  if (kind === "target") return new Set((citedBy.get(id) || []).map(c => c.tech));
  return new Set();
}

function applyHighlight() {
  const activeId = hoverId ?? selectedId;
  const connected = activeId ? connectedIds(activeId) : null;
  for (const [id, { g }] of nodeEls) {
    const isActive = activeId != null && (id === activeId || connected.has(id));
    g.classList.toggle("dim", activeId != null && !isActive);
    g.classList.toggle("selected", id === selectedId);
  }
  for (const path of chordEls) {
    const tech = path.dataset.tech, target = path.dataset.target;
    const touches = activeId != null && (tech === activeId || target === activeId);
    path.classList.toggle("active", touches);
    path.classList.toggle("dim", activeId != null && !touches);
  }
  for (const row of legendEl.querySelectorAll(".row[data-group]")) {
    row.classList.remove("dim");
  }
}
function setHover(id) { hoverId = id; applyHighlight(); }

function select(id, kind) {
  selectedId = selectedId === id ? null : id;
  applyHighlight();
  if (!selectedId) { closeSidebar(); return; }
  if (kind === "tech") showTechniqueDetail(id); else showTargetDetail(id);
}

// ── Sidebar ─────────────────────────────────────────────────────────────
function closeSidebar() { sidebar.classList.remove("open"); sidebar.innerHTML = ""; }
function openSidebar(html) {
  sidebar.innerHTML = `<span class="closebtn" id="close">×</span>${html}`;
  sidebar.classList.add("open");
  sidebar.querySelector("#close").onclick = () => { selectedId = null; applyHighlight(); closeSidebar(); };
  sidebar.querySelectorAll("[data-jump]").forEach(elx => elx.onclick = () => {
    const jid = elx.dataset.jump, jkind = nodeEls.get(jid)?.kind;
    selectedId = jid; applyHighlight();
    if (jkind === "tech") showTechniqueDetail(jid); else showTargetDetail(jid);
  });
}

function showTechniqueDetail(id) {
  const tech = techsById.get(id);
  const color = groupsById.get(tech.group).color;
  const rows = tech.citations.map(c => {
    const t = targetsById.get(c.target);
    return `<li><span class="link" data-jump="${esc(c.target)}">${esc(t.label)}</span>
      <p style="margin-top:2px">${esc(c.note)}</p></li>`;
  }).join("");
  openSidebar(`
    <h2>${esc(tech.title)}</h2>
    <div class="meta">${esc(tech.file)}${tech.rung ? " · " + esc(tech.rung) : ""}</div>
    <span class="badge" style="border-color:${color};color:${color}">${esc(tech.group)}</span>
    <h3>Description</h3><p>${esc(tech.description)}</p>
    <h3>Grounds in werkstoff (${tech.citations.length})</h3>
    <ul>${rows}</ul>
  `);
}

function showTargetDetail(id) {
  const target = targetsById.get(id);
  const citers = citedBy.get(id) || [];
  const rows = citers.map(c => {
    const t = techsById.get(c.tech);
    const color = groupsById.get(t.group).color;
    return `<li><span class="link" data-jump="${esc(c.tech)}" style="color:${color}">${esc(t.title)}</span>
      <p style="margin-top:2px">${esc(c.note)}</p></li>`;
  }).join("");
  openSidebar(`
    <h2>${esc(target.label)}</h2>
    <div class="meta">grounding target · ${esc(target.family)}</div>
    <h3>What it is</h3><p>${esc(target.description)}</p>
    <h3>Cited by (${citers.length})</h3>
    <ul>${rows}</ul>
  `);
}

// Legend row hover/click: preview / pin every technique in that group.
legendEl.querySelectorAll(".row[data-group]").forEach(row => {
  const gid = row.dataset.group;
  row.addEventListener("mouseenter", () => {
    const ids = gid === "__targets__" ? TARGETS.map(t => t.id) : TECHNIQUES.filter(t => t.group === gid).map(t => t.id);
    for (const [id, { g }] of nodeEls) g.classList.toggle("dim", !ids.includes(id));
    for (const path of chordEls) path.classList.toggle("dim", !ids.includes(path.dataset.tech) && !ids.includes(path.dataset.target));
  });
  row.addEventListener("mouseleave", () => applyHighlight());
});

// Click on empty canvas clears selection.
wrap.addEventListener("click", e => { if (e.target === svg || e.target === wrap) { selectedId = null; applyHighlight(); closeSidebar(); } });

// ── viewBox: reserve left space for the floating HUD, same trick as
// reasoning-trace-viewer.html's fitViewBox, so the top-arc nodes don't load
// in hidden underneath it. ──────────────────────────────────────────────
const LEFT_RESERVE = 300;
svg.setAttribute("viewBox", `${-LEFT_RESERVE} 0 ${W + LEFT_RESERVE} ${H}`);
svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

// ── Pan / zoom (plain mouse events, no library) ──────────────────────────
let vpX = 0, vpY = 0, vpK = 1;
function applyTransform() { viewport.setAttribute("transform", `translate(${vpX} ${vpY}) scale(${vpK})`); }
let dragging = false, lastX = 0, lastY = 0;
wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; wrap.classList.add("dragging"); });
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  vpX += e.clientX - lastX; vpY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener("mouseup", () => { dragging = false; wrap.classList.remove("dragging"); });
wrap.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = Math.exp(-e.deltaY * 0.001);
  const newK = Math.min(4, Math.max(0.25, vpK * factor));
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  vpX = mx - (mx - vpX) * (newK / vpK);
  vpY = my - (my - vpY) * (newK / vpK);
  vpK = newK;
  applyTransform();
}, { passive: false });

applyHighlight();
</script>
</body>
</html>
